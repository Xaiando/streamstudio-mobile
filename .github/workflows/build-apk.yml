name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master", "work"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform + build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Build project upload ZIP bundle
        run: ./scripts/make_mobile_zip.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamstudio-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload project ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamstudio-project-zip
          path: StreamStudio-mobile-upload.zip
          if-no-files-found: error

      - name: Publish release assets (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-assets-${{ github.run_number }}
          name: StreamStudio mobile assets ${{ github.run_number }}
          body: |
            Automated mobile assets bundle.
            Commit: ${{ github.sha }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            StreamStudio-mobile-upload.zip
